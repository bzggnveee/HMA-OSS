name: Release Build

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    if: ${{ github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'docs:') }}

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Gradle wrapper validation
        uses: gradle/wrapper-validation-action@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Prepare env
        run: |
          touch local.properties
          mkdir -p ~/.config/.android
          ln -s ~/.config/.android ~/.android

      - name: Cache gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.config/.android/debug.keystore
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Gradle prebuild
        run: |
          echo 'org.gradle.jvmargs=-Xmx2048m' >> gradle.properties
          ./gradlew prebuild

      - name: Create debug keystore
        run: |
          if [ ! -f ~/.config/.android/debug.keystore ]; then
            keytool -genkey -v \
              -keystore ~/.config/.android/debug.keystore \
              -alias androiddebugkey \
              -storepass android \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build release
        id: buildRelease
        run: |
          ./gradlew :app:assembleRelease
          ./gradlew :zygote:assembleRelease
          echo "zipName=$(basename zygote/build/outputs/magisk/release/*.zip .zip)" >> $GITHUB_OUTPUT

      - name: Upload release ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildRelease.outputs.zipName }}
          path: zygote/build/outputs/magisk/release/*.zip
